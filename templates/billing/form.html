{% extends "base.html" %}
{% block title %}Create Invoice{% endblock %}
{% block content %}
<div class="topbar">
  <div>
    <h1>Create Invoice</h1>
  </div>
</div>

<div class="card">
  <form method="POST">
    <div class="form-grid">
      <div>
        <label for="patient_id">Patient</label>
        <select name="patient_id" id="patient_id" required>
          <option value="">Select patient</option>
          {% for p in patients %}
          <option value="{{ p.patient_id }}">{{ p.first_name }} {{ p.last_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label for="appointment_id">Appointment (optional)</label>
        <select name="appointment_id" id="appointment_id">
          <option value="">None</option>
          {% for a in appointments %}
          <option value="{{ a.appointment_id }}">#{{ a.appointment_id }} — {{ a.appointment_date }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label for="consultation_fee">Consultation Fee (₹)</label>
        <input type="number" step="0.01" name="consultation_fee" id="consultation_fee" value="0">
      </div>
      <div>
        <label for="medicine_charges">Medicine Charges (₹)</label>
        <input type="number" step="0.01" name="medicine_charges" id="medicine_charges" value="0">
      </div>
      <div>
        <label for="room_charges">Room Charges (₹)</label>
        <input type="number" step="0.01" name="room_charges" id="room_charges" value="0">
      </div>
      <div>
        <label for="other_charges">Other Charges (₹)</label>
        <input type="number" step="0.01" name="other_charges" id="other_charges" value="0">
      </div>
      <div>
        <label for="payment_status">Payment Status</label>
        <select name="payment_status" id="payment_status">
          <option value="Pending">Pending</option>
          <option value="Paid">Paid</option>
          <option value="Partially Paid">Partially Paid</option>
        </select>
      </div>
      <div>
        <label for="payment_method">Payment Method</label>
        <select name="payment_method" id="payment_method">
          <option value="">Select method</option>
          <option value="Cash">Cash</option>
          <option value="Card">Card</option>
          <option value="UPI">UPI</option>
          <option value="Insurance">Insurance</option>
        </select>
      </div>
    </div>
    <div class="actions-row" style="margin-top:20px">
      <button type="submit" class="btn btn-primary">Create Invoice</button>
      <a href="{{ url_for('billing.list_bills') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
