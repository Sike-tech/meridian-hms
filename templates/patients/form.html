{% extends "base.html" %}
{% block title %}{{ 'Edit' if patient else 'Register' }} Patient{% endblock %}
{% block content %}
<div class="topbar">
  <div>
    <h1>{{ 'Edit' if patient else 'Register New' }} Patient</h1>
  </div>
</div>

<div class="card">
  <form method="POST">
    <div class="form-grid">
      <div>
        <label for="first_name">First Name</label>
        <input type="text" name="first_name" id="first_name"
               value="{{ patient.first_name if patient else '' }}" required>
      </div>
      <div>
        <label for="last_name">Last Name</label>
        <input type="text" name="last_name" id="last_name"
               value="{{ patient.last_name if patient else '' }}" required>
      </div>
      <div>
        <label for="date_of_birth">Date of Birth</label>
        <div class="date-field">
          <input type="text" name="date_of_birth" class="datepicker" placeholder="yyyy-mm-dd"
                 value="{{ patient.date_of_birth if patient else '' }}" required>
          <button type="button" class="datepicker-btn" tabindex="-1">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18"/><path d="M8 2v4M16 2v4"/></svg>
          </button>
        </div>
      </div>
      <div>
        <label for="gender">Gender</label>
        <select name="gender" id="gender" required>
          <option value="">Select</option>
          <option value="Male" {{ 'selected' if patient and patient.gender == 'Male' }}>Male</option>
          <option value="Female" {{ 'selected' if patient and patient.gender == 'Female' }}>Female</option>
          <option value="Other" {{ 'selected' if patient and patient.gender == 'Other' }}>Other</option>
        </select>
      </div>
      <div>
        <label for="blood_group">Blood Group</label>
        <input type="text" name="blood_group" id="blood_group"
               value="{{ patient.blood_group if patient else '' }}" placeholder="e.g. O+">
      </div>
      <div>
        <label for="phone">Phone</label>
        <input type="text" name="phone" id="phone"
               value="{{ patient.phone if patient else '' }}">
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" name="email" id="email"
               value="{{ patient.email if patient else '' }}">
      </div>
      <div>
        <label for="emergency_contact">Emergency Contact</label>
        <input type="text" name="emergency_contact" id="emergency_contact"
               value="{{ patient.emergency_contact if patient else '' }}">
      </div>
      <div style="grid-column: 1/-1">
        <label for="address">Address</label>
        <textarea name="address" id="address">{{ patient.address if patient else '' }}</textarea>
      </div>
      <div>
        <label for="admission_status">Admission Status</label>
        <select name="admission_status" id="admission_status">
          <option value="Outpatient" {{ 'selected' if patient and patient.admission_status == 'Outpatient' }}>Outpatient</option>
          <option value="Admitted" {{ 'selected' if patient and patient.admission_status == 'Admitted' }}>Admitted</option>
          <option value="Discharged" {{ 'selected' if patient and patient.admission_status == 'Discharged' }}>Discharged</option>
        </select>
      </div>
      <div>
        <label for="ward">Ward</label>
        <input type="text" name="ward" id="ward"
               value="{{ patient.ward if patient else '' }}">
      </div>
    </div>
    <div class="actions-row" style="margin-top:20px">
      <button type="submit" class="btn btn-primary">{{ 'Update' if patient else 'Register' }} Patient</button>
      <a href="{{ url_for('patients.list_patients') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
