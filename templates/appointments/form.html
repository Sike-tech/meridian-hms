{% extends "base.html" %}
{% block title %}{{ 'Edit' if appointment else 'New' }} Appointment{% endblock %}
{% block content %}
<div class="topbar">
  <div>
    <h1>{{ 'Edit' if appointment else 'Schedule' }} Appointment</h1>
  </div>
</div>

<div class="card">
  <form method="POST">
    <div class="form-grid">
      <div>
        <label for="patient_id">Patient</label>
        <select name="patient_id" id="patient_id" required>
          <option value="">Select patient</option>
          {% for p in patients %}
          <option value="{{ p.patient_id }}" {{ 'selected' if appointment and appointment.patient_id == p.patient_id }}>
            {{ p.first_name }} {{ p.last_name }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label for="doctor_id">Doctor</label>
        <select name="doctor_id" id="doctor_id" required>
          <option value="">Select doctor</option>
          {% for d in doctors %}
          <option value="{{ d.doctor_id }}" {{ 'selected' if appointment and appointment.doctor_id == d.doctor_id }}>
            Dr. {{ d.first_name }} {{ d.last_name }} ({{ d.specialization }})
          </option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label for="appointment_date">Date</label>
        <input type="text" name="appointment_date" class="datepicker"
               value="{{ appointment.appointment_date if appointment else '' }}" placeholder="dd/mm/yyyy" required>
      </div>
      <div>
        <label for="appointment_time">Time</label>
        <input type="time" name="appointment_time" id="appointment_time"
               value="{{ appointment.appointment_time if appointment else '' }}" required>
      </div>
      <div style="grid-column: 1/-1">
        <label for="reason">Reason</label>
        <textarea name="reason" id="reason">{{ appointment.reason if appointment else '' }}</textarea>
      </div>
      <div>
        <label for="status">Status</label>
        <select name="status" id="status">
          <option value="Scheduled" {{ 'selected' if appointment and appointment.status == 'Scheduled' }}>Scheduled</option>
          <option value="Completed" {{ 'selected' if appointment and appointment.status == 'Completed' }}>Completed</option>
          <option value="Cancelled" {{ 'selected' if appointment and appointment.status == 'Cancelled' }}>Cancelled</option>
          <option value="No-Show" {{ 'selected' if appointment and appointment.status == 'No-Show' }}>No-Show</option>
        </select>
      </div>
    </div>
    <div class="actions-row" style="margin-top:20px">
      <button type="submit" class="btn btn-primary">{{ 'Update' if appointment else 'Schedule' }} Appointment</button>
      <a href="{{ url_for('appointments.list_appointments') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
